<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麦当劳喜好预测系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error,
        .form-group select.error {
            border-color: #e74c3c;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-item {
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .result-item h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .charts-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .chart-container h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        canvas {
            max-width: 100%;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .history-table tr:hover {
            background: #f5f5f5;
        }

        .positive {
            color: #27ae60;
            font-weight: bold;
        }

        .negative {
            color: #e74c3c;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h4 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .comparison-section {
            margin-top: 20px;
        }

        .comparison-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .comparison-item h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .comparison-bars {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .comparison-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .comparison-bar .label {
            min-width: 100px;
            font-weight: 600;
        }

        .comparison-bar .bar-container {
            flex: 1;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .comparison-bar .bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
        }

        .comparison-bar .value {
            min-width: 50px;
            text-align: right;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍔 麦当劳喜好预测系统</h1>
            <p>基于机器学习的用户偏好分析工具</p>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>📝 用户信息输入</h2>
                <form id="predictionForm">
                    <div class="form-group">
                        <label for="age">年龄 *</label>
                        <input type="number" id="age" name="age" min="18" max="100" placeholder="请输入年龄" required>
                        <div class="error-message" id="ageError">年龄必须在18-100岁之间</div>
                    </div>

                    <div class="form-group">
                        <label for="gender">性别 *</label>
                        <select id="gender" name="gender" required>
                            <option value="">请选择性别</option>
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                        <div class="error-message" id="genderError">请选择性别</div>
                    </div>

                    <div class="form-group">
                        <label for="income">月收入（元）*</label>
                        <input type="number" id="income" name="income" min="0" placeholder="请输入月收入" required>
                        <div class="error-message" id="incomeError">请输入有效的月收入</div>
                    </div>

                    <div class="form-group">
                        <label for="visit_frequency">访问频率 *</label>
                        <select id="visit_frequency" name="visit_frequency" required>
                            <option value="">请选择访问频率</option>
                            <option value="rarely">很少</option>
                            <option value="monthly">每月</option>
                            <option value="weekly">每周</option>
                            <option value="daily">每天</option>
                        </select>
                        <div class="error-message" id="visitFrequencyError">请选择访问频率</div>
                    </div>

                    <div class="form-group">
                        <label for="satisfaction_level">满意度 *</label>
                        <select id="satisfaction_level" name="satisfaction_level" required>
                            <option value="">请选择满意度</option>
                            <option value="low">低</option>
                            <option value="medium">中</option>
                            <option value="high">高</option>
                        </select>
                        <div class="error-message" id="satisfactionLevelError">请选择满意度</div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">🔍 预测喜好</button>
                </form>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>正在分析数据...</p>
                </div>

                <div class="result-section" id="resultSection">
                    <div class="result-item">
                        <h3>预测结果</h3>
                        <div class="result-value" id="predictionResult"></div>
                    </div>
                    <div class="result-item">
                        <h3>置信度</h3>
                        <div class="result-value" id="confidenceResult"></div>
                    </div>
                </div>

                <div class="charts-section">
                    <div class="chart-container">
                        <h3>📊 特征重要性</h3>
                        <canvas id="importanceChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>📈 数据分析</h2>
                
                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="stats">统计概览</button>
                    <button class="tab-btn" data-tab="comparison">多维度对比</button>
                    <button class="tab-btn" data-tab="history">预测历史</button>
                </div>

                <div class="tab-content active" id="statsTab">
                    <div class="stats-grid" id="statsGrid"></div>
                    <div class="charts-section" style="margin-top: 20px;">
                        <div class="chart-container">
                            <h3>性别分布</h3>
                            <canvas id="genderChart"></canvas>
                        </div>
                        <div class="chart-container">
                            <h3>访问频率分布</h3>
                            <canvas id="visitChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="comparisonTab">
                    <div class="comparison-section" id="comparisonSection"></div>
                </div>

                <div class="tab-content" id="historyTab">
                    <div class="history-section">
                        <table class="history-table" id="historyTable">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>年龄</th>
                                    <th>性别</th>
                                    <th>收入</th>
                                    <th>访问频率</th>
                                    <th>满意度</th>
                                    <th>结果</th>
                                    <th>置信度</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        /**
         * 表单验证函数
         * @param {HTMLFormElement} form - 表单元素
         * @returns {boolean} - 验证是否通过
         */
        function validateForm(form) {
            let isValid = true;
            const fields = [
                { id: 'age', errorId: 'ageError', validate: (v) => v >= 18 && v <= 100 },
                { id: 'gender', errorId: 'genderError', validate: (v) => v !== '' },
                { id: 'income', errorId: 'incomeError', validate: (v) => v >= 0 },
                { id: 'visit_frequency', errorId: 'visitFrequencyError', validate: (v) => v !== '' },
                { id: 'satisfaction_level', errorId: 'satisfactionLevelError', validate: (v) => v !== '' }
            ];

            fields.forEach(field => {
                const input = document.getElementById(field.id);
                const error = document.getElementById(field.errorId);
                const value = input.value;

                if (!field.validate(value)) {
                    input.classList.add('error');
                    error.classList.add('show');
                    isValid = false;
                } else {
                    input.classList.remove('error');
                    error.classList.remove('show');
                }
            });

            return isValid;
        }

        /**
         * 显示加载状态
         * @param {boolean} show - 是否显示
         */
        function showLoading(show) {
            const loading = document.getElementById('loading');
            const submitBtn = document.getElementById('submitBtn');
            if (show) {
                loading.classList.add('show');
                submitBtn.disabled = true;
            } else {
                loading.classList.remove('show');
                submitBtn.disabled = false;
            }
        }

        /**
         * 格式化日期
         * @param {string} isoString - ISO日期字符串
         * @returns {string} - 格式化后的日期
         */
        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }

        /**
         * 格式化性别
         * @param {string} gender - 性别值
         * @returns {string} - 格式化后的性别
         */
        function formatGender(gender) {
            return gender === 'male' ? '男' : '女';
        }

        /**
         * 格式化访问频率
         * @param {string} freq - 频率值
         * @returns {string} - 格式化后的频率
         */
        function formatFrequency(freq) {
            const map = { rarely: '很少', monthly: '每月', weekly: '每周', daily: '每天' };
            return map[freq] || freq;
        }

        /**
         * 格式化满意度
         * @param {string} level - 满意度值
         * @returns {string} - 格式化后的满意度
         */
        function formatSatisfaction(level) {
            const map = { low: '低', medium: '中', high: '高' };
            return map[level] || level;
        }

        /**
         * 初始化图表
         */
        let importanceChart, genderChart, visitChart;

        function initCharts() {
            const importanceCtx = document.getElementById('importanceChart').getContext('2d');
            importanceChart = new Chart(importanceCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '特征重要性',
                        data: [],
                        backgroundColor: 'rgba(102, 126, 234, 0.7)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `重要性: ${(context.raw * 100).toFixed(1)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return (value * 100).toFixed(0) + '%';
                                }
                            }
                        }
                    }
                }
            });

            const genderCtx = document.getElementById('genderChart').getContext('2d');
            genderChart = new Chart(genderCtx, {
                type: 'doughnut',
                data: {
                    labels: ['男', '女'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.7)',
                            'rgba(118, 75, 162, 0.7)'
                        ],
                        borderColor: [
                            'rgba(102, 126, 234, 1)',
                            'rgba(118, 75, 162, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((context.raw / total) * 100).toFixed(1);
                                    return `${context.label}: ${context.raw} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });

            const visitCtx = document.getElementById('visitChart').getContext('2d');
            visitChart = new Chart(visitCtx, {
                type: 'pie',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.7)',
                            'rgba(118, 75, 162, 0.7)',
                            'rgba(155, 89, 182, 0.7)',
                            'rgba(192, 57, 43, 0.7)'
                        ],
                        borderColor: [
                            'rgba(102, 126, 234, 1)',
                            'rgba(118, 75, 162, 1)',
                            'rgba(155, 89, 182, 1)',
                            'rgba(192, 57, 43, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((context.raw / total) * 100).toFixed(1);
                                    return `${context.label}: ${context.raw} (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        /**
         * 更新特征重要性图表
         * @param {Object} importance - 特征重要性数据
         */
        function updateImportanceChart(importance) {
            const labels = Object.keys(importance);
            const data = Object.values(importance);
            importanceChart.data.labels = labels;
            importanceChart.data.datasets[0].data = data;
            importanceChart.update();
        }

        /**
         * 更新统计数据
         * @param {Object} stats - 统计数据
         */
        function updateStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <h4>总样本数</h4>
                    <div class="value">${stats.total_samples}</div>
                </div>
                <div class="stat-card">
                    <h4>喜好率</h4>
                    <div class="value">${(stats.positive_ratio * 100).toFixed(1)}%</div>
                </div>
                <div class="stat-card">
                    <h4>平均年龄</h4>
                    <div class="value">${stats.avg_age.toFixed(1)}岁</div>
                </div>
                <div class="stat-card">
                    <h4>平均收入</h4>
                    <div class="value">¥${stats.avg_income.toFixed(0)}</div>
                </div>
                <div class="stat-card">
                    <h4>历史预测数</h4>
                    <div class="value">${stats.history_count}</div>
                </div>
            `;

            genderChart.data.datasets[0].data = [
                stats.gender_distribution.male || 0,
                stats.gender_distribution.female || 0
            ];
            genderChart.update();

            const visitLabels = Object.keys(stats.visit_distribution).map(formatFrequency);
            const visitData = Object.values(stats.visit_distribution);
            visitChart.data.labels = visitLabels;
            visitChart.data.datasets[0].data = visitData;
            visitChart.update();

            updateComparison(stats);
        }

        /**
         * 更新对比数据
         * @param {Object} stats - 统计数据
         */
        function updateComparison(stats) {
            const comparisonSection = document.getElementById('comparisonSection');
            const maxValue = Math.max(
                Object.values(stats.gender_distribution),
                Object.values(stats.visit_distribution),
                Object.values(stats.satisfaction_distribution)
            );

            comparisonSection.innerHTML = `
                <div class="comparison-item">
                    <h4>性别分布对比</h4>
                    <div class="comparison-bars">
                        ${Object.entries(stats.gender_distribution).map(([gender, count]) => `
                            <div class="comparison-bar">
                                <span class="label">${formatGender(gender)}</span>
                                <div class="bar-container">
                                    <div class="bar" style="width: ${(count / maxValue) * 100}%"></div>
                                </div>
                                <span class="value">${count}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="comparison-item">
                    <h4>访问频率对比</h4>
                    <div class="comparison-bars">
                        ${Object.entries(stats.visit_distribution).map(([freq, count]) => `
                            <div class="comparison-bar">
                                <span class="label">${formatFrequency(freq)}</span>
                                <div class="bar-container">
                                    <div class="bar" style="width: ${(count / maxValue) * 100}%"></div>
                                </div>
                                <span class="value">${count}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="comparison-item">
                    <h4>满意度对比</h4>
                    <div class="comparison-bars">
                        ${Object.entries(stats.satisfaction_distribution).map(([level, count]) => `
                            <div class="comparison-bar">
                                <span class="label">${formatSatisfaction(level)}</span>
                                <div class="bar-container">
                                    <div class="bar" style="width: ${(count / maxValue) * 100}%"></div>
                                </div>
                                <span class="value">${count}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        /**
         * 更新历史记录
         * @param {Array} history - 历史记录数组
         */
        function updateHistory(history) {
            const historyBody = document.getElementById('historyBody');
            historyBody.innerHTML = history.map(item => `
                <tr>
                    <td>${formatDate(item.timestamp)}</td>
                    <td>${item.age}</td>
                    <td>${formatGender(item.gender)}</td>
                    <td>¥${item.income.toFixed(0)}</td>
                    <td>${formatFrequency(item.visit_frequency)}</td>
                    <td>${formatSatisfaction(item.satisfaction_level)}</td>
                    <td class="${item.prediction ? 'positive' : 'negative'}">${item.prediction ? '喜欢' : '不喜欢'}</td>
                    <td>${(item.confidence * 100).toFixed(1)}%</td>
                </tr>
            `).join('');
        }

        /**
         * 加载统计数据
         */
        async function loadStats() {
            try {
                const response = await fetch('/statistics');
                const data = await response.json();
                if (data.success) {
                    updateStats(data.data);
                }
            } catch (error) {
                console.error('加载统计数据失败:', error);
            }
        }

        /**
         * 加载历史记录
         */
        async function loadHistory() {
            try {
                const response = await fetch('/history');
                const data = await response.json();
                if (data.success) {
                    updateHistory(data.data);
                }
            } catch (error) {
                console.error('加载历史记录失败:', error);
            }
        }

        /**
         * 提交预测
         * @param {Event} e - 表单提交事件
         */
        async function submitPrediction(e) {
            e.preventDefault();

            if (!validateForm(e.target)) {
                return;
            }

            showLoading(true);

            try {
                const formData = Object.fromEntries(new FormData(e.target));
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    const resultSection = document.getElementById('resultSection');
                    const predictionResult = document.getElementById('predictionResult');
                    const confidenceResult = document.getElementById('confidenceResult');

                    predictionResult.textContent = data.data.prediction ? '👍 喜欢麦当劳' : '👎 不喜欢麦当劳';
                    predictionResult.className = `result-value ${data.data.prediction ? 'positive' : 'negative'}`;
                    confidenceResult.textContent = `${(data.data.confidence * 100).toFixed(1)}%`;

                    resultSection.classList.add('show');
                    updateImportanceChart(data.data.feature_importance);

                    await loadHistory();
                    await loadStats();
                } else {
                    alert('预测失败: ' + data.error);
                }
            } catch (error) {
                alert('网络错误，请稍后重试');
                console.error('预测失败:', error);
            } finally {
                showLoading(false);
            }
        }

        /**
         * 初始化标签页切换
         */
        function initTabs() {
            const tabButtons = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');

            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.dataset.tab;

                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    tabContents.forEach(content => content.classList.remove('active'));

                    button.classList.add('active');
                    document.getElementById(`${tabId}Tab`).classList.add('active');

                    if (tabId === 'history') {
                        loadHistory();
                    }
                });
            });
        }

        /**
         * 初始化应用
         */
        function init() {
            initCharts();
            initTabs();
            loadStats();

            document.getElementById('predictionForm').addEventListener('submit', submitPrediction);

            const inputs = document.querySelectorAll('#predictionForm input, #predictionForm select');
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    input.classList.remove('error');
                    const errorId = input.id + 'Error';
                    const error = document.getElementById(errorId);
                    if (error) {
                        error.classList.remove('show');
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
