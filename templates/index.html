<!DOCTYPE html>
<html>
<head>
    <title>McDonald喜好预测</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>用户喜好预测系统</h1>
    <form id="predictionForm">
        <input type="number" name="age" placeholder="年龄" required>
        <input type="number" name="visit_frequency" placeholder="每月访问次数" required>
        <button type="submit">预测</button>
    </form>
    <div id="result"></div>
    <canvas id="importanceChart"></canvas>
    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
            });
            const data = await response.json();

            document.getElementById('result').innerHTML = `
                <p>预测结果: ${data.prediction ? '喜欢' : '不喜欢'}</p>
                <p>置信度: ${(data.confidence * 100).toFixed(1)}%</p>
            `;

            new Chart(document.getElementById('importanceChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data.feature_importance),
                    datasets: [{
                        label: '特征重要性',
                        data: Object.values(data.feature_importance),
                        backgroundColor: 'rgba(54, 162, 235, 0.5)'
                    }]
                }
            });
        });
    </script>
</body>
</html>
