<!DOCTYPE html>
<html>
<head>
    <title>McDonald喜好预测</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2 {
            color: #333;
            margin-top: 0;
        }
        h1 {
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h2 {
            margin-top: 30px;
            color: #555;
            border-left: 4px solid #4CAF50;
            padding-left: 10px;
        }
        form {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
        button:active {
            background-color: #3d8b40;
        }
        #result {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f0f8ff;
            font-size: 16px;
        }
        #historyContainer {
            margin: 20px 0;
            overflow-x: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
            color: #333;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loadingIndicator {
            display: inline-flex;
            align-items: center;
            margin-left: 10px;
            color: #4CAF50;
        }
        #loadingIndicator span {
            margin-left: 5px;
        }
        #comparisonContainer {
            margin: 20px 0;
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            background-color: white;
        }
        #importanceChart {
            margin: 20px 0;
            height: 300px;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            background-color: white;
        }
        @media (max-width: 768px) {
            form {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 10px;
            }
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>用户喜好预测系统</h1>
        <form id="predictionForm">
            <div class="form-group">
                <label for="age">年龄</label>
                <input type="number" id="age" name="age" placeholder="请输入年龄" required>
            </div>
            <div class="form-group">
                <label for="gender">性别</label>
                <select id="gender" name="gender" required>
                    <option value="">选择性别</option>
                    <option value="male">男</option>
                    <option value="female">女</option>
                </select>
            </div>
            <div class="form-group">
                <label for="income">收入</label>
                <input type="number" id="income" name="income" placeholder="请输入收入" required>
            </div>
            <div class="form-group">
                <label for="visit_frequency">访问频率</label>
                <select id="visit_frequency" name="visit_frequency" required>
                    <option value="">选择访问频率</option>
                    <option value="daily">每天</option>
                    <option value="weekly">每周</option>
                    <option value="monthly">每月</option>
                    <option value="rarely">很少</option>
                </select>
            </div>
            <div class="form-group">
                <label for="satisfaction_level">满意度</label>
                <select id="satisfaction_level" name="satisfaction_level" required>
                    <option value="">选择满意度</option>
                    <option value="low">低</option>
                    <option value="medium">中</option>
                    <option value="high">高</option>
                </select>
            </div>
            <div class="form-group" style="align-self: flex-end;">
                <button type="submit">预测</button>
                <div id="loadingIndicator" style="display: none;">
                    <div class="spinner"></div>
                    <span>预测中...</span>
                </div>
            </div>
        </form>
        <div id="result"></div>
        <canvas id="importanceChart"></canvas>
        
        <h2>预测历史记录</h2>
        <div id="historyContainer">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>年龄</th>
                        <th>性别</th>
                        <th>收入</th>
                        <th>访问频率</th>
                        <th>满意度</th>
                        <th>预测结果</th>
                        <th>置信度</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <!-- 历史记录将通过JavaScript动态添加 -->
                </tbody>
            </table>
        </div>
        
        <h2>数据对比分析</h2>
        <div id="comparisonContainer">
            <canvas id="comparisonChart"></canvas>
        </div>
    </div>
    <script>
        /**
         * 保存预测历史记录到localStorage
         * @param {Object} formData - 表单数据
         * @param {Object} predictionData - 预测结果数据
         */
        function savePredictionHistory(formData, predictionData) {
            const history = JSON.parse(localStorage.getItem('predictionHistory') || '[]');
            history.push({
                ...formData,
                prediction: predictionData.prediction ? '喜欢' : '不喜欢',
                confidence: (predictionData.confidence * 100).toFixed(1),
                timestamp: new Date().toLocaleString()
            });
            // 只保留最近10条记录
            if (history.length > 10) {
                history.shift();
            }
            localStorage.setItem('predictionHistory', JSON.stringify(history));
        }

        /**
         * 渲染预测历史记录
         */
        function renderPredictionHistory() {
            const history = JSON.parse(localStorage.getItem('predictionHistory') || '[]');
            const historyBody = document.getElementById('historyBody');
            historyBody.innerHTML = '';
            
            history.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.age}</td>
                    <td>${item.gender === 'male' ? '男' : '女'}</td>
                    <td>${item.income}</td>
                    <td>${item.visit_frequency === 'daily' ? '每天' : item.visit_frequency === 'weekly' ? '每周' : item.visit_frequency === 'monthly' ? '每月' : '很少'}</td>
                    <td>${item.satisfaction_level === 'low' ? '低' : item.satisfaction_level === 'medium' ? '中' : '高'}</td>
                    <td>${item.prediction}</td>
                    <td>${item.confidence}%</td>
                    <td>${item.timestamp}</td>
                `;
                historyBody.appendChild(row);
            });
        }

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = Object.fromEntries(new FormData(e.target));
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            // 表单验证
            const age = parseInt(formData.age);
            const income = parseFloat(formData.income);
            
            if (isNaN(age) || age < 18) {
                document.getElementById('result').innerHTML = `
                    <p style="color: red;">请输入有效的年龄（18岁及以上）</p>
                `;
                return;
            }
            
            if (isNaN(income) || income < 0) {
                document.getElementById('result').innerHTML = `
                    <p style="color: red;">请输入有效的收入</p>
                `;
                return;
            }
            
            // 显示加载动画
            loadingIndicator.style.display = 'inline-flex';
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) {
                    throw new Error(`服务器响应错误: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (!data || typeof data.prediction === 'undefined') {
                    throw new Error('无效的预测结果');
                }

            document.getElementById('result').innerHTML = `
                <p>预测结果: ${data.prediction ? '喜欢' : '不喜欢'}</p>
                <p>置信度: ${(data.confidence * 100).toFixed(1)}%</p>
            `;

            new Chart(document.getElementById('importanceChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(data.feature_importance),
                    datasets: [{
                        label: '特征重要性',
                        data: Object.values(data.feature_importance),
                        backgroundColor: 'rgba(54, 162, 235, 0.5)'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const featureName = context.label;
                                    const importance = context.raw;
                                    const percentage = (importance * 100).toFixed(2);
                                    return `${featureName}: ${percentage}%`;
                                }
                            }
                        }
                    }
                }
            });

            // 保存并渲染历史记录和对比图表
            savePredictionHistory(formData, data);
            renderPredictionHistory();
            renderComparisonChart();
        } catch (error) {
            console.error('预测失败:', error);
            let errorMessage = '预测失败，请稍后重试';
            
            if (error.message.includes('服务器响应错误')) {
                errorMessage = '服务器暂时无法处理请求，请稍后重试';
            } else if (error.message.includes('无效的预测结果')) {
                errorMessage = '预测结果格式错误，请联系管理员';
            } else if (error.message.includes('Network')) {
                errorMessage = '网络连接失败，请检查您的网络连接';
            }
            
            document.getElementById('result').innerHTML = `
                <p style="color: red;">${errorMessage}</p>
            `;
        } finally {
            // 隐藏加载动画
            loadingIndicator.style.display = 'none';
        }
    });

        /**
         * 渲染数据对比图表
         */
        function renderComparisonChart() {
            const history = JSON.parse(localStorage.getItem('predictionHistory') || '[]');
            if (history.length === 0) return;
            
            // 准备数据
            const labels = history.map(item => item.timestamp);
            const ages = history.map(item => parseInt(item.age));
            const incomes = history.map(item => parseFloat(item.income));
            const confidences = history.map(item => parseFloat(item.confidence));
            
            new Chart(document.getElementById('comparisonChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '年龄',
                            data: ages,
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.2)',
                            yAxisID: 'y'
                        },
                        {
                            label: '收入',
                            data: incomes,
                            borderColor: 'rgba(75, 192, 192, 1)',
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            yAxisID: 'y1'
                        },
                        {
                            label: '置信度',
                            data: confidences,
                            borderColor: 'rgba(255, 159, 64, 1)',
                            backgroundColor: 'rgba(255, 159, 64, 0.2)',
                            yAxisID: 'y2'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    stacked: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        if (label.includes('收入')) {
                                            label += context.parsed.y.toFixed(2);
                                        } else if (label.includes('置信度')) {
                                            label += context.parsed.y.toFixed(1) + '%';
                                        } else {
                                            label += context.parsed.y;
                                        }
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: '年龄'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: '收入'
                            },
                            grid: {
                                drawOnChartArea: false,
                            },
                        },
                        y2: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: '置信度 (%)'
                            },
                            grid: {
                                drawOnChartArea: false,
                            },
                        },
                    }
                }
            });
        }

        // 页面加载时渲染历史记录和对比图表
        window.onload = function() {
            renderPredictionHistory();
            renderComparisonChart();
        };
    </script>
</body>
</html>
