<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鸢尾花分类预测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 4px;
            border-left: 4px solid #4CAF50;
        }
        
        .result h2 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .prediction {
            font-size: 18px;
            font-weight: bold;
            color: #4CAF50;
        }
        
        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>鸢尾花分类预测</h1>
        
        <form id="predictionForm">
            <div class="form-group">
                <label for="sepal_length">花萼长度 (cm)</label>
                <input type="number" id="sepal_length" step="0.1" required>
            </div>
            
            <div class="form-group">
                <label for="sepal_width">花萼宽度 (cm)</label>
                <input type="number" id="sepal_width" step="0.1" required>
            </div>
            
            <div class="form-group">
                <label for="petal_length">花瓣长度 (cm)</label>
                <input type="number" id="petal_length" step="0.1" required>
            </div>
            
            <div class="form-group">
                <label for="petal_width">花瓣宽度 (cm)</label>
                <input type="number" id="petal_width" step="0.1" required>
            </div>
            
            <button type="submit">预测</button>
        </form>
        
        <div class="result" id="result" style="display: none;">
            <h2>预测结果</h2>
            <p>预测类别: <span class="prediction" id="prediction"></span></p>
            <p>类别ID: <span id="prediction_id"></span></p>
        </div>
        
        <div class="error" id="error" style="display: none;"></div>
    </div>
    
    <script>
        document.getElementById('predictionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const sepal_length = parseFloat(document.getElementById('sepal_length').value);
            const sepal_width = parseFloat(document.getElementById('sepal_width').value);
            const petal_length = parseFloat(document.getElementById('petal_length').value);
            const petal_width = parseFloat(document.getElementById('petal_width').value);
            
            // 构建请求数据
            const data = {
                sepal_length: sepal_length,
                sepal_width: sepal_width,
                petal_length: petal_length,
                petal_width: petal_width
            };
            
            // 发送请求
            fetch('http://localhost:5001/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    // 显示错误
                    document.getElementById('error').textContent = data.error;
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('result').style.display = 'none';
                } else {
                    // 显示结果
                    document.getElementById('prediction').textContent = data.prediction;
                    document.getElementById('prediction_id').textContent = data.prediction_id;
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('error').style.display = 'none';
                }
            })
            .catch(error => {
                document.getElementById('error').textContent = '请求失败: ' + error.message;
                document.getElementById('error').style.display = 'block';
                document.getElementById('result').style.display = 'none';
            });
        });
    </script>
</body>
</html>
